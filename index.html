<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MART Editor</title>

    <!-- CSS -->

    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/toolbar.css">
    <link rel="stylesheet" href="css/panels.css">
    <link rel="stylesheet" href="css/canvas.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/command.css">

</head>

<body>

    <div id="editor">

        <!-- ====================================================== -->
        <!-- Header -->
        <!-- ====================================================== -->

        <header id="app-header">

            <div class="header-left">
                <button id="sidebar-toggle">☰</button>
                <div id="logo">

                    MART

                </div>

                <input id="project-name" type="text" value="Untitled Project">
                <p class="save-status">🖫 Saving...</p>
            </div>
            <div class="middle-menu">
                <button class="menu-item">File</button>

                <button class="menu-item">Edit</button>

                <button class="menu-item">View</button>

                <button class="menu-item">Window</button>

                <button class="menu-item">Help</button>
            </div>
            <div class="header-right">

                <button id="btnUndo">Undo</button>

                <button id="btnRedo">Redo</button>

                <button id="btnSave">Save</button>

                <button id="btnExport">Export</button>

            </div>

        </header>



        <!-- ====================================================== -->
        <!-- Main -->
        <!-- ====================================================== -->

        <main id="main-layout">

            <!-- =============================================== -->
            <!-- Sidebar -->
            <!-- =============================================== -->

            <aside id="sidebar">

                <div id="panel-container">

                    <!--
                    Properties
                    Layers
                    Assets
                    History
                    Colors
                    Effects
                    Typography
                    Alignment
                    Export
                    Plugins
                -->

                </div>

            </aside>



            <!-- =============================================== -->
            <!-- Sidebar Splitter -->
            <!-- =============================================== -->

            <div id="sidebar-splitter"></div>



            <!-- =============================================== -->
            <!-- Workspace -->
            <!-- =============================================== -->

            <section id="workspace">

                <!-- Workspace Overlay -->

                <nav id="toolbar">

                    <div id="toolbar-handle">
                        ⋮⋮⋮⋮⋮⋮⋮⋮
                    </div>

                    <!-- Selection -->

                    <div class="tool-group">

                        <button class="tool-button has-group active" data-group="selection" data-tool="select"
                            title="Selection">

                            <svg class="tool-icon">
                                <use href="assets/icons.svg#icon-select"></use>
                            </svg>

                        </button>

                    </div>

                    <!-- Shapes -->

                    <div class="tool-group">

                        <button class="tool-button has-group" data-group="shape" data-tool="rectangle"
                            title="Rectangle">

                            <svg class="tool-icon">
                                <use href="assets/icons.svg#icon-rectangle"></use>
                            </svg>

                        </button>

                    </div>

                    <!-- Pen -->

                    <div class="tool-group">

                        <button class="tool-button has-group" data-group="pen" data-tool="pen" title="Pen">

                            <svg class="tool-icon">
                                <use href="assets/icons.svg#icon-pen"></use>
                            </svg>

                        </button>

                    </div>

                    <!-- Text -->

                    <div class="tool-group">

                        <button class="tool-button" data-tool="text" title="Text">

                            <svg class="tool-icon">
                                <use href="assets/icons.svg#icon-text"></use>
                            </svg>

                        </button>

                    </div>

                    <!-- Image -->

                    <div class="tool-group">

                        <button class="tool-button" data-tool="image" title="Image">

                            <svg class="tool-icon">
                                <use href="assets/icons.svg#icon-image"></use>
                            </svg>

                        </button>

                    </div>

                    <!-- Crop -->

                    <div class="tool-group">

                        <button class="tool-button" data-tool="crop" title="Crop">

                            <svg class="tool-icon">
                                <use href="assets/icons.svg#icon-crop"></use>
                            </svg>

                        </button>

                    </div>

                    <!-- Brush -->

                    <div class="tool-group">

                        <button class="tool-button" data-tool="brush" title="Brush">

                            <svg class="tool-icon">
                                <use href="assets/icons.svg#icon-brush"></use>
                            </svg>

                        </button>

                    </div>

                    <!-- Eraser -->

                    <div class="tool-group">

                        <button class="tool-button" data-tool="eraser" title="Eraser">

                            <svg class="tool-icon">
                                <use href="assets/icons.svg#icon-eraser"></use>
                            </svg>

                        </button>

                    </div>

                </nav>

                <!-- Shared Flyout -->

                <div id="tool-flyout" hidden>

                </div>

                <!-- Workspace View -->

                <div id="workspace-view">

                    <div id="canvas-container">

                        <canvas id="editor-canvas"></canvas>

                    </div>

                </div>

            </section>

        </main>



        <!-- ====================================================== -->
        <!-- Status Bar -->
        <!-- ====================================================== -->

        <footer id="statusbar">

            <div id="status-left">

                Ready

            </div>

            <div id="status-right">

                <span id="tool-name">

                    Select

                </span>

                |

                <span id="zoom-level">

                    100%

                </span>

            </div>

        </footer>

    </div>



    <!-- ====================================================== -->
    <!-- Command Palette -->
    <!-- ====================================================== -->

    <div id="command-palette" class="hidden">

        <input id="command-input" type="text" placeholder="Type a command...">

        <div id="command-results"></div>

    </div>

    <script type="module" src="js/app.js"></script>

</body>

</html>
