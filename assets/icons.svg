<svg xmlns="http://www.w3.org/2000/svg" style="display:none">

<!-- Select -->
<symbol id="icon-select" viewBox="0 0 24 24">
    <path d="M5 3L18 16L13 17L11 22L8.5 15.5L3 13Z"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linejoin="round"/>
</symbol>

<!-- Node -->
<symbol id="icon-node" viewBox="0 0 24 24">
    <circle cx="6" cy="6" r="2" fill="currentColor"/>
    <circle cx="18" cy="6" r="2" fill="currentColor"/>
    <circle cx="12" cy="18" r="2" fill="currentColor"/>
    <path d="M8 6H16M7 8L11 16M17 8L13 16"
          stroke="currentColor"
          stroke-width="2"/>
</symbol>

<!-- Pen -->
<symbol id="icon-pen" viewBox="0 0 24 24">
    <path d="M5 19L9 18L19 8L16 5L6 15L5 19Z"
          fill="none"
          stroke="currentColor"
          stroke-width="2"/>
</symbol>

<!-- Rectangle -->
<symbol id="icon-rectangle" viewBox="0 0 24 24">
    <rect x="4" y="6" width="16" height="12"
          rx="1"
          fill="none"
          stroke="currentColor"
          stroke-width="2"/>
</symbol>

<!-- Ellipse -->
<symbol id="icon-ellipse" viewBox="0 0 24 24">
    <ellipse cx="12"
             cy="12"
             rx="8"
             ry="6"
             fill="none"
             stroke="currentColor"
             stroke-width="2"/>
</symbol>

<!-- Text -->
<symbol id="icon-text" viewBox="0 0 24 24">
    <path d="M5 5H19M12 5V19"
          stroke="currentColor"
          stroke-width="2"/>
</symbol>

<!-- Image -->
<symbol id="icon-image" viewBox="0 0 24 24">
    <rect x="3"
          y="4"
          width="18"
          height="16"
          fill="none"
          stroke="currentColor"
          stroke-width="2"/>
    <circle cx="8" cy="9" r="1.5" fill="currentColor"/>
    <path d="M5 17L10 12L14 16L17 13L20 17"
          stroke="currentColor"
          stroke-width="2"
          fill="none"/>
</symbol>

<!-- Crop -->
<symbol id="icon-crop" viewBox="0 0 24 24">
    <path d="M7 3V17A4 4 0 0011 21H21
             M3 7H17A4 4 0 0121 11V21"
          stroke="currentColor"
          stroke-width="2"
          fill="none"/>
</symbol>

<!-- Brush -->
<symbol id="icon-brush" viewBox="0 0 24 24">
    <path d="M14 5L19 10L10 19C9 20 7 20 6 19C5 18 5 16 6 15L14 5Z"
          fill="none"
          stroke="currentColor"
          stroke-width="2"/>
</symbol>

<!-- Eraser -->
<symbol id="icon-eraser" viewBox="0 0 24 24">
    <path d="M7 17L14 10L19 15L15 19H9L7 17Z"
          fill="none"
          stroke="currentColor"
          stroke-width="2"/>
</symbol>

</svg>